name: Deploy Prod

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Cloudflare (prod)
    runs-on: ubuntu-latest
    environment: production
    env:
      ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
      ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      # Secrets — same for dev and prod
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
      # GOOGLE_GENERATIVE_AI_API_KEY intentionally omitted — AI is disabled in prod
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      # Prod-specific
      DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
      CORS_ORIGIN: https://open-clock-web-prod.ludvig1411.workers.dev
      BETTER_AUTH_URL: https://open-clock-server-prod.ludvig1411.workers.dev
      POLAR_SUCCESS_URL: https://open-clock-web-prod.ludvig1411.workers.dev/success?checkout_id={CHECKOUT_ID}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy
        run: bun run deploy:prod
        working-directory: packages/infra
